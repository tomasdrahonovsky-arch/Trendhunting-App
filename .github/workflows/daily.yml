name: Daily Trend Intelligence

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Trend Intelligence Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py

      - name: Commit and push newsletter
        run: |
          git config user.name "Trend Agent"
          git config user.email "trend-agent@users.noreply.github.com"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "Daily digest $(date +%Y-%m-%d)"
          git push
